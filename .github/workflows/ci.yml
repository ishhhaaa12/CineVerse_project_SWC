# =============================================================================
# CineVerse — Continuous Integration & Deployment Pipeline
# =============================================================================
# This workflow runs on every push and pull request to the master branch.
# It ensures the codebase is always in a buildable, lint-clean, and
# test-passing state before any code is merged or deployed.
#
# Pipeline stages:
#   1. checkout     → fetch source code
#   2. setup        → configure Node.js with npm cache
#   3. install      → restore / install node_modules
#   4. lint         → enforce code quality with ESLint
#   5. type-check   → TypeScript strict type verification
#   6. test         → run Jest unit & integration tests
#   7. build        → produce the optimized Next.js production bundle
# =============================================================================

name: CI — Lint, Test & Build

# ---------------------------------------------------------------------------
# Triggers: run on push to master and on all pull requests targeting master
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

# ---------------------------------------------------------------------------
# Cancel any in-progress run for the same branch/PR when a new one starts.
# This prevents queue build-up on rapid pushes.
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB: ci
  # Runs the full lint → type-check → test → build pipeline
  # ===========================================================================
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    # -------------------------------------------------------------------------
    # Node.js version matrix — test against the minimum supported version
    # and the version used in the Docker production image
    # -------------------------------------------------------------------------
    strategy:
      matrix:
        node-version: [18.x, 22.x]

    steps:
      # -----------------------------------------------------------------------
      # STEP 1: Checkout
      # Fetches the full git history so tools like `git log` work correctly.
      # -----------------------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # Installs the requested Node.js version and configures the npm cache
      # directory so subsequent runs restore node_modules from cache instead
      # of re-downloading all packages from the registry.
      # -----------------------------------------------------------------------
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # -----------------------------------------------------------------------
      # STEP 3: Install Dependencies
      # Uses `npm ci` (clean install) instead of `npm install`:
      #   - Reproduces the exact dependency tree from package-lock.json
      #   - Fails if package-lock.json is out of sync with package.json
      #   - Does NOT update lock files (safe for CI)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # STEP 4: Lint
      # Runs ESLint across all source files using the Next.js lint config.
      # Enforces code style, catches potential bugs, and ensures consistency.
      # Fails the pipeline if any ESLint errors are present.
      # -----------------------------------------------------------------------
      - name: Run ESLint
        run: npm run lint

      # -----------------------------------------------------------------------
      # STEP 5: TypeScript Type Check
      # Runs the TypeScript compiler in no-emit mode (`tsc --noEmit`).
      # Catches type errors that ESLint may miss.
      # Does NOT produce output files — purely a static analysis step.
      # -----------------------------------------------------------------------
      - name: TypeScript type check
        run: npx tsc --noEmit

      # -----------------------------------------------------------------------
      # STEP 6: Run Tests
      # Executes the Jest test suite covering:
      #   - Unit tests (utility functions, Redux slices, API services)
      #   - Component tests (React Testing Library)
      #   - Integration tests (API mock flows)
      # Generates a code coverage report saved as an artifact.
      # The --passWithNoTests flag ensures CI does not fail if tests are
      # temporarily removed — this should be removed once tests are stable.
      # -----------------------------------------------------------------------
      - name: Run tests with coverage
        run: npm test -- --coverage --passWithNoTests
        env:
          # Provide dummy values for NEXT_PUBLIC vars so the build doesn't
          # fail due to missing environment variables in CI
          NEXT_PUBLIC_OMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_OMDB_API_KEY || 'ci_placeholder_omdb_key' }}
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY || 'ci_placeholder_gemini_key' }}
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.NEXT_PUBLIC_YOUTUBE_API_KEY || 'ci_placeholder_yt_key' }}

      # -----------------------------------------------------------------------
      # STEP 7: Upload Coverage Report
      # Saves the Jest coverage report as a downloadable GitHub Actions artifact.
      # Useful for auditing test coverage over time.
      # Only runs for the Node 22 matrix entry to avoid duplicate uploads.
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      # -----------------------------------------------------------------------
      # STEP 8: Build Production Bundle
      # Runs `next build` to produce the optimized production output in `.next/`.
      # This is the definitive "does the app compile?" check.
      # Environment variables are set to placeholder values for CI safety.
      # -----------------------------------------------------------------------
      - name: Build Next.js production bundle
        run: npm run build
        env:
          # Dummy keys prevent runtime "API key not configured" errors during build.
          # Real keys are only needed at runtime (not at build time for this app).
          NEXT_PUBLIC_OMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_OMDB_API_KEY || 'ci_build_placeholder' }}
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY || 'ci_build_placeholder' }}
          NEXT_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.NEXT_PUBLIC_YOUTUBE_API_KEY || 'ci_build_placeholder' }}

      # -----------------------------------------------------------------------
      # STEP 9: Upload Build Artifact
      # Saves the compiled .next/ directory as a GitHub Actions artifact.
      # This can be used by downstream deploy jobs without re-building.
      # Only saved for the Node 22 (production) matrix entry.
      # -----------------------------------------------------------------------
      - name: Upload build artifact
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            public/
            package.json
            package-lock.json
          retention-days: 7

  # ===========================================================================
  # JOB: docker-build
  # Builds the Docker image to verify the Dockerfile is valid and the
  # containerized app compiles successfully.
  # Only runs on push to master (not on PRs) to save CI minutes.
  # ===========================================================================
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      # Checkout is required before Docker can access the Dockerfile
      - name: Checkout source code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Build the Docker image with a build-arg placeholder for env vars.
      # The --no-cache flag ensures a clean build each time.
      # -----------------------------------------------------------------------
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_OMDB_API_KEY=ci_placeholder \
            --build-arg NEXT_PUBLIC_GEMINI_API_KEY=ci_placeholder \
            --build-arg NEXT_PUBLIC_YOUTUBE_API_KEY=ci_placeholder \
            -t cineverse:ci-${{ github.sha }} \
            .

      - name: Verify Docker image was created
        run: docker images cineverse:ci-${{ github.sha }}
